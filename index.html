<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morlen & Peggy 財務管理系統</title>
    <style>
        /* 整體背景：改為單色大地暖沙色，降低眼睛負擔 */
        body { 
            margin: 0; 
            padding: 20px 10px; 
            background-color: #F4EAE0; /* 暖沙大地色 */
            font-family: "Microsoft JhengHei", sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        /* 容器：柔和白，增加撞色邊框感 */
        .container { 
            background: #FDFCF0; 
            width: 100%; 
            max-width: 480px; 
            padding: 25px; 
            border-radius: 35px; 
            box-shadow: 12px 12px 0px #F4A261; /* 橘棕色撞色陰影 */
            border: 3px solid #264653; /* 深藍綠邊框 */
        }
        
        /* 標題：採用活潑的珊瑚粉紅 */
        h2 { 
            text-align:center; 
            background: #E76F51; /* 珊瑚粉紅 */
            color: #fff; 
            display: inline-block;
            width: 100%;
            padding: 12px 0;
            border-radius: 15px;
            margin-bottom:10px; 
            font-weight: 900; 
            font-size: 1.6em; 
            box-shadow: 4px 4px 0px #264653;
        }
        .sub-title { 
            text-align:center; 
            color: #264653; 
            font-size:1.1em; 
            margin-bottom:25px; 
            font-weight: bold; 
            background: #E9C46A; /* 明黃色 */
            padding: 8px;
            border-radius: 10px;
        }
        
        .field { margin-bottom: 25px; }
        label { 
            display: inline-block; 
            margin-bottom: 10px; 
            font-weight: 900; 
            color: #fff; 
            background: #264653; 
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 1.1em; 
        }
        
        /* 按鈕群組 */
        .group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn { 
            padding: 15px 5px; 
            border: 2px solid #264653; 
            border-radius: 12px; 
            background: #fff; 
            cursor: pointer; 
            text-align: center; 
            font-weight: 900; 
            transition: 0.2s; 
            font-size: 1em; 
            color: #264653;
            box-shadow: 3px 3px 0px #264653;
        }
        .btn.active { 
            background: #2A9D8F; 
            color: #fff;
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #264653;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #264653; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 20px; 
            outline: none; 
            font-weight: 900; 
            background: #fff;
            color: #264653;
        }
        
        /* 分類按鈕：內文字黑色、字體放大 */
        .choice-btn { 
            background: #fff; 
            border: 2px solid #264653; 
            border-radius: 15px; 
            padding: 18px 10px; /* 增加高度更易點選 */
            text-align: center; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 12px; 
            transition: 0.2s; 
            box-shadow: 4px 4px 0px #264653;
        }
        .choice-btn.active { 
            background: #E76F51; 
            color: #fff !important; /* 選中時維持白色 */
            box-shadow: 0px 0px 0px #264653;
            transform: translate(2px, 2px);
        }
        .choice-btn .t { 
            font-weight: 900; 
            display: block; 
            font-size: 1.25em; /* 字體放大 */
            color: #000000; /* 未選中時文字純黑 */
        }
        
        /* 確認按鈕 */
        .submit-btn { 
            width: 100%; 
            padding: 20px; 
            background: #2A9D8F; 
            color: white; 
            border: 2px solid #264653; 
            border-radius: 18px; 
            font-size: 1.5em; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 15px; 
            box-shadow: 6px 6px 0px #264653;
        }
        .submit-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #264653;
        }
        
        /* 看板 */
        .dashboard { 
            margin-top: 30px; 
            padding: 20px; 
            background: #E9C46A; 
            border-radius: 25px; 
            border: 2px solid #264653; 
            box-shadow: 6px 6px 0px #264653;
        }
        .dashboard h3 { 
            margin-top: 0; 
            font-size: 1.2em; 
            background: #264653;
            color: #fff; 
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 900; 
            display: inline-block;
        }
        
        .db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top:15px; }
        .db-label { color: #264653; font-weight: 900; font-size: 0.95em; }
        .db-value { font-weight: 900; font-size: 1.4em; color: #264653; }
        
        .warning { background: #E76F51; color: #fff !important; border-radius: 5px; padding: 2px 5px; }
        .full-width { grid-column: span 2; padding-top: 12px; border-top: 2px dashed #264653; }
        
        #val_debt_countdown { font-size: 1.1em; color: #264653; font-weight: 900; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎨 Morlen & Peggy 財務系統</h2>
    <p class="sub-title">給一兒一女最好的家：清空債務</p>

    <div class="field">
        <label>交易類型</label>
        <div class="group" id="typeGroup">
            <div class="btn active" onclick="changeType('支出', this)">支出</div>
            <div class="btn" onclick="changeType('收入', this)">收入</div>
            <div class="btn" onclick="changeType('信用卡', this)">信用卡</div>
        </div>
    </div>

    <div class="field">
        <label>所屬人</label>
        <div class="group" id="payerGroup">
            <div class="btn" onclick="selectPayer('潘宥樽', this)">潘宥樽</div>
            <div class="btn" onclick="selectPayer('朱沛祺', this)">朱沛祺</div>
            <div class="btn" onclick="selectPayer('共同基金', this)">共同基金</div>
        </div>
    </div>

    <div class="field">
        <label>金額</label>
        <input type="number" id="amount" placeholder="請輸入金額" inputmode="decimal">
    </div>

    <div class="field">
        <label>選擇分類</label>
        <div id="categoryArea"></div>
    </div>

    <div class="field">
        <label>備註</label>
        <input type="text" id="note" placeholder="詳細說明">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="sendToGoogle()">🚀 確認送出紀錄</button>

    <div class="dashboard">
        <h3>📊 即時看板</h3>
        <div class="db-grid">
            <div class="db-item"><span class="db-label">潘宥樽 支出</span><br><span class="db-value" id="val_morlen_spend">...</span></div>
            <div class="db-item"><span class="db-label">潘宥樽 刷卡</span><br><span class="db-value" id="val_morlen_credit">...</span></div>
            <div class="db-item"><span class="db-label">朱沛祺 支出</span><br><span class="db-value" id="val_wife_spend">...</span></div>
            <div class="db-item"><span class="db-label">朱沛祺 刷卡</span><br><span class="db-value" id="val_wife_credit">...</span></div>
            <div class="db-item full-width">
                <span class="db-label">共同基金餘額</span><br>
                <span class="db-value" id="val_fund" style="color: #264653;">...</span>
            </div>
            <div class="db-item full-width">
                <span class="db-label">🚨 債務倒數看板</span><br>
                <span class="db-value" id="val_debt_countdown">連線中...</span>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxesmpsyBSKfmvXPPQrBR4HZRr06jizlDA9Tv2Fvw-AtLY3t-Ekea4_bQEDlZbBiVhWvg/exec";

    let selectedType = "支出";
    let selectedPayer = "";
    let selectedCategory = "";

    const categories = {
        "支出": ["居家生活", "飲食採買", "孩子專區", "交通通訊", "醫療稅務", "興趣休閒", "動物教學專區", "ACCUPASS出差支出", "負債清零計畫", "繳信用卡費", "靈活應用金", "其他"],
        "信用卡": ["居家生活", "飲食採買", "孩子專區", "交通通訊", "醫療稅務", "興趣休閒", "動物教學專區", "ACCUPASS出差支出", "靈活應用金", "其他"],
        "收入": ["薪資收入", "投資收入", "其他收入"]
    };

    async function loadDashboard() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            updateText('val_morlen_spend', data.morlen_spend, 40000);
            updateText('val_morlen_credit', data.morlen_credit, 10000);
            updateText('val_wife_spend', data.wife_spend, 40000);
            updateText('val_wife_credit', data.wife_credit, 10000);
            document.getElementById('val_fund').innerText = "$" + (data.fund || 0).toLocaleString();
            document.getElementById('val_debt_countdown').innerText = data.debt_countdown || "加油！夢想在不遠處";
        } catch (err) {
            console.error("看板連線失敗");
        }
    }

    function updateText(id, value, limit) {
        const el = document.getElementById(id);
        if (!el) return;
        const val = parseFloat(value) || 0;
        el.innerText = "$" + val.toLocaleString();
        if (val > limit) el.classList.add('warning');
        else el.classList.remove('warning');
    }

    function renderCategories() {
        const area = document.getElementById('categoryArea');
        area.innerHTML = "";
        categories[selectedType].forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerHTML = `<span class="t">${cat}</span>`;
            btn.onclick = function() {
                document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedCategory = cat;
            };
            area.appendChild(btn);
        });
    }

    function changeType(type, el) {
        selectedType = type;
        document.querySelectorAll('#typeGroup .btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedCategory = "";
        renderCategories();
    }

    function selectPayer(val, el) {
        document.querySelectorAll('#payerGroup .btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedPayer = val;
    }

    function sendToGoogle() {
        let amount = document.getElementById('amount').value.trim();
        const note = document.getElementById('note').value.trim();
        if(!amount || !selectedPayer || !selectedCategory) return alert('請填寫完整！');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        if ((selectedType === "支出" || selectedType === "信用卡") && !amount.startsWith("-")) {
            amount = "-" + amount;
        }

        const params = new URLSearchParams();
        params.append('entry.760255955', selectedType); 
        params.append('entry.1900830363', selectedPayer);
        params.append('entry.883377183', amount);
        params.append('entry.1671228725', selectedCategory);
        params.append('entry.429727703', note);

        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeZincp4x3IA2v3ykuSmBhdFu_QeYL_iHbwreguQeINtw8HeA/formResponse";
        
        fetch(`${formURL}?${params.toString()}`, { mode: 'no-cors' })
            .then(() => {
                alert('已成功紀錄！');
                location.reload();
            });
    }

    window.onload = function() {
        renderCategories();
        loadDashboard();
    };
</script>
</body>
</html>
