<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morlen 財務管理系統</title>
    <style>
        body { margin: 0; padding: 20px 10px; background: url('https://images.unsplash.com/photo-1497250681960-ef046c08a56e?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; background-size: cover; font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: rgba(255, 255, 255, 0.96); width: 100%; max-width: 480px; padding: 25px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #333; }
        .group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn { padding: 12px 5px; border: 2px solid #eee; border-radius: 12px; background: white; cursor: pointer; text-align: center; font-weight: bold; transition: 0.2s; font-size: 0.9em; }
        .btn.active { border-color: #2d5a27; background: #f0f7ef; color: #2d5a27; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 18px; outline: none; }
        .choice-btn { background: white; border: 2px solid #eee; border-radius: 16px; padding: 15px; text-align: left; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.2s; }
        .choice-btn.active { border-color: #2d5a27; background: #f0f7ef; }
        .choice-btn .t { font-weight: bold; display: block; }
        .submit-btn { width: 100%; padding: 18px; background: #2d5a27; color: white; border: none; border-radius: 15px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#2d5a27; margin-bottom:5px;">🌿 財務管理系統</h2>
    <p style="text-align:center; color:#666; font-size:0.85em; margin-bottom:25px;">目標：還清債務 50 萬 ＆ 中山區購屋</p>

    <div class="field">
        <label>交易類型</label>
        <div class="group" id="typeGroup">
            <div class="btn active" onclick="changeType('支出', this)">支出</div>
            <div class="btn" onclick="changeType('收入', this)">收入</div>
            <div class="btn" onclick="changeType('信用卡', this)">信用卡</div>
        </div>
    </div>

    <div class="field">
        <label id="payerLabel">所屬人</label>
        <div class="group" id="payerGroup">
            <div class="btn" onclick="selectPayer('潘宥樽', this)">潘宥樽</div>
            <div class="btn" onclick="selectPayer('朱沛祺', this)">朱沛祺</div>
            <div class="btn" onclick="selectPayer('共同基金', this)">共同基金</div>
        </div>
    </div>

    <div class="field">
        <label>金額</label>
        <input type="number" id="amount" placeholder="請輸入金額" inputmode="decimal">
    </div>

    <div class="field">
        <label>選擇分類</label>
        <div id="categoryArea"></div>
    </div>

    <div class="field">
        <label>備註</label>
        <input type="text" id="note" placeholder="詳細說明">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="sendToGoogle()">確認送出</button>
</div>

<script>
    let selectedType = "支出";
    let selectedPayer = "";
    let selectedCategory = "";

    const categories = {
        "支出": ["居家生活", "飲食採買", "孩子專區", "交通通訊", "醫療稅務", "興趣休閒", "動物教學專區", "ACCUPASS出差支出", "負債清零計畫", "靈活應用金", "其他"],
        "收入": ["薪資收入", "投資收入", "其他收入"],
        "信用卡": ["居家生活", "飲食採買", "交通通訊", "其他"]
    };

    function renderCategories() {
        const area = document.getElementById('categoryArea');
        area.innerHTML = "";
        categories[selectedType].forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerHTML = `<span class="t">${cat}</span>`;
            btn.onclick = function() {
                document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedCategory = cat;
            };
            area.appendChild(btn);
        });
    }

    function changeType(type, el) {
        selectedType = type;
        document.querySelectorAll('#typeGroup .btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedCategory = "";
        renderCategories();
    }

    function selectPayer(val, el) {
        document.querySelectorAll('#payerGroup .btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedPayer = val;
    }

    function sendToGoogle() {
        let amount = document.getElementById('amount').value.trim();
        const note = document.getElementById('note').value.trim();
        if(!amount || !selectedPayer || !selectedCategory) return alert('請填寫完整！');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        // 財務邏輯：支出與信用卡自動變負數，方便試算表統計
        if (selectedType === "支出" || selectedType === "信用卡") {
            amount = "-" + amount;
        }

        const params = new URLSearchParams();
        params.append('entry.760255955', selectedType); 
        params.append('entry.1900830363', selectedPayer);
        params.append('entry.883377183', amount);
        params.append('entry.1671228725', selectedCategory);
        params.append('entry.429727703', note);

        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeZincp4x3IA2v3ykuSmBhdFu_QeYL_iHbwreguQeINtw8HeA/formResponse";
        
        fetch(`${formURL}?${params.toString()}`, { mode: 'no-cors' })
            .then(() => {
                alert(selectedType + ' 記錄成功！');
                location.reload();
            });
    }

    renderCategories();
</script>
</body>
</html>
