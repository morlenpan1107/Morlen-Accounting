<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morlen 財務管理系統 - 大地色系版</title>
    <style>
        /* 背景：低對比度的植物背景 */
        body { 
            margin: 0; 
            padding: 20px 10px; 
            background: url('https://images.unsplash.com/photo-1497250681960-ef046c08a56e?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; 
            background-size: cover; 
            background-blend-mode: overlay;
            background-color: rgba(234, 226, 183, 0.4); /* 暖黃色濾鏡 */
            font-family: "Microsoft JhengHei", sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        /* 容器：暖沙大地色 */
        .container { 
            background: #FDF0D5; /* 暖沙色 */
            width: 100%; 
            max-width: 480px; 
            padding: 25px; 
            border-radius: 30px; 
            box-shadow: 12px 12px 0px #BC6C25; /* 陶土棕撞色陰影 */
            border: 3px solid #283618; /* 深森林綠邊框 */
        }
        
        /* 標題：焦糖棕設計 */
        h2 { 
            text-align:center; 
            background: #BC6C25; /* 焦糖色 */
            color: #fff; 
            display: inline-block;
            width: 100%;
            padding: 12px 0;
            border-radius: 12px;
            margin-bottom:10px; 
            font-weight: 900; 
            font-size: 1.6em; 
            box-shadow: 4px 4px 0px #283618;
        }
        .sub-title { 
            text-align:center; 
            color: #283618; 
            font-size:1.1em; 
            margin-bottom:25px; 
            font-weight: bold; 
            background: #DDA15E; /* 淺土黃 */
            padding: 8px;
            border-radius: 8px;
        }
        
        .field { margin-bottom: 25px; }
        label { 
            display: inline-block; 
            margin-bottom: 10px; 
            font-weight: 900; 
            color: #fff; 
            background: #283618; /* 深綠標籤 */
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 1em; 
        }
        
        /* 按鈕群組：莫蘭迪撞色 */
        .group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn { 
            padding: 15px 5px; 
            border: 2px solid #283618; 
            border-radius: 10px; 
            background: #FEFAE0; /* 象牙色 */
            cursor: pointer; 
            text-align: center; 
            font-weight: 900; 
            transition: 0.2s; 
            font-size: 1em; 
            color: #283618;
            box-shadow: 3px 3px 0px #283618;
        }
        /* 選中狀態：鼠尾草綠 */
        .btn.active { 
            background: #606C38; /* 鼠尾草綠 */
            color: #fff;
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #283618;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #283618; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 20px; 
            outline: none; 
            font-weight: 900; 
            background: #FEFAE0;
            color: #283618;
        }
        
        /* 分類按鈕：陶土紅調 */
        .choice-btn { 
            background: #FEFAE0; 
            border: 2px solid #283618; 
            border-radius: 15px; 
            padding: 14px; 
            text-align: center; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 10px; 
            transition: 0.2s; 
            box-shadow: 3px 3px 0px #283618;
        }
        .choice-btn.active { 
            background: #BC6C25; /* 陶土紅 */
            color: #fff;
            box-shadow: 0px 0px 0px #283618;
        }
        .choice-btn .t { font-weight: 900; font-size: 1.1em; }
        
        /* 確認按鈕：大膽綠色 */
        .submit-btn { 
            width: 100%; 
            padding: 20px; 
            background: #606C38; 
            color: white; 
            border: 2px solid #283618; 
            border-radius: 15px; 
            font-size: 1.5em; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 15px; 
            box-shadow: 6px 6px 0px #283618;
            text-shadow: 1px 1px 0px #000;
        }
        .submit-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #283618;
        }
        
        /* 看板：改為穩重的大地深色調 */
        .dashboard { 
            margin-top: 30px; 
            padding: 20px; 
            background: #DDA15E; 
            border-radius: 20px; 
            border: 2px solid #283618; 
            box-shadow: 6px 6px 0px #283618;
        }
        .dashboard h3 { 
            margin-top: 0; 
            font-size: 1.2em; 
            background: #283618;
            color: #FEFAE0; 
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: 900; 
            display: inline-block;
        }
        
        .db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top:15px; }
        .db-label { color: #283618; font-weight: 900; font-size: 0.9em; }
        .db-value { font-weight: 900; font-size: 1.4em; color: #283618; }
        
        .warning { background: #AE2012; color: #fff !important; padding: 0 4px; border-radius: 4px; }
        .full-width { grid-column: span 2; padding-top: 12px; border-top: 2px dashed #283618; }
        
        #val_debt_countdown { font-size: 1.1em; color: #283618; font-weight: 900; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 Morlen & Peggy 財務系統</h2>
    <p class="sub-title">給家人最好的：負債清零 ＆ 換車</p>

    <div class="field">
        <label>交易類型</label>
        <div class="group" id="typeGroup">
            <div class="btn active" onclick="changeType('支出', this)">支出</div>
            <div class="btn" onclick="changeType('收入', this)">收入</div>
            <div class="btn" onclick="changeType('信用卡', this)">信用卡</div>
        </div>
    </div>

    <div class="field">
        <label>所屬人</label>
        <div class="group" id="payerGroup">
            <div class="btn" onclick="selectPayer('潘宥樽', this)">潘宥樽</div>
            <div class="btn" onclick="selectPayer('朱沛祺', this)">朱沛祺</div>
            <div class="btn" onclick="selectPayer('共同基金', this)">共同基金</div>
        </div>
    </div>

    <div class="field">
        <label>金額</label>
        <input type="number" id="amount" placeholder="請輸入金額" inputmode="decimal">
    </div>

    <div class="field">
        <label>選擇分類</label>
        <div id="categoryArea"></div>
    </div>

    <div class="field">
        <label>備註</label>
        <input type="text" id="note" placeholder="補充說明">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="sendToGoogle()">💾 紀錄當前帳目</button>

    <div class="dashboard">
        <h3>📊 2月即時狀態</h3>
        <div class="db-grid">
            <div class="db-item"><span class="db-label">潘宥樽 支出</span><br><span class="db-value" id="val_morlen_spend">...</span></div>
            <div class="db-item"><span class="db-label">潘宥樽 刷卡</span><br><span class="db-value" id="val_morlen_credit">...</span></div>
            <div class="db-item"><span class="db-label">朱沛祺 支出</span><br><span class="db-value" id="val_wife_spend">...</span></div>
            <div class="db-item"><span class="db-label">朱沛祺 刷卡</span><br><span class="db-value" id="val_wife_credit">...</span></div>
            <div class="db-item full-width">
                <span class="db-label">共同基金目前水位</span><br>
                <span class="db-value" id="val_fund" style="color: #606C38;">...</span>
            </div>
            <div class="db-item full-width">
                <span class="db-label">🚨 債務清除進度</span><br>
                <span class="db-value" id="val_debt_countdown">連線中...</span>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxesmpsyBSKfmvXPPQrBR4HZRr06jizlDA9Tv2Fvw-AtLY3t-Ekea4_bQEDlZbBiVhWvg/exec";

    let selectedType = "支出";
    let selectedPayer = "";
    let selectedCategory = "";

    const categories = {
        "支出": ["居家生活", "飲食採買", "孩子專區", "交通通訊", "醫療稅務", "興趣休閒", "動物教學專區", "ACCUPASS出差支出", "負債清零計畫", "繳信用卡費", "靈活應用金", "其他"],
        "信用卡": ["居家生活", "飲食採買", "孩子專區", "交通通訊", "醫療稅務", "興趣休閒", "動物教學專區", "ACCUPASS出差支出", "靈活應用金", "其他"],
        "收入": ["薪資收入", "投資收入", "其他收入"]
    };

    async function loadDashboard() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            updateText('val_morlen_spend', data.morlen_spend, 40000);
            updateText('val_morlen_credit', data.morlen_credit, 10000);
            updateText('val_wife_spend', data.wife_spend, 40000);
            updateText('val_wife_credit', data.wife_credit, 10000);
            document.getElementById('val_fund').innerText = "$" + (data.fund || 0).toLocaleString();
            document.getElementById('val_debt_countdown').innerText = data.debt_countdown || "加油！夢想不遠";
        } catch (err) {
            console.error("看板連線失敗");
        }
    }

    function updateText(id, value, limit) {
        const el = document.getElementById(id);
        if (!el) return;
        const val = parseFloat(value) || 0;
        el.innerText = "$" + val.toLocaleString();
        if (val > limit) el.classList.add('warning');
        else el.classList.remove('warning');
    }

    function renderCategories() {
        const area = document.getElementById('categoryArea');
        area.innerHTML = "";
        categories[selectedType].forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerHTML = `<span class="t">${cat}</span>`;
            btn.onclick = function() {
                document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedCategory = cat;
            };
            area.appendChild(btn);
        });
    }

    function changeType(type, el) {
        selectedType = type;
        document.querySelectorAll('#typeGroup .btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedCategory = "";
        renderCategories();
    }

    function selectPayer(val, el) {
        document.querySelectorAll('#payerGroup .btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedPayer = val;
    }

    function sendToGoogle() {
        let amount = document.getElementById('amount').value.trim();
        const note = document.getElementById('note').value.trim();
        if(!amount || !selectedPayer || !selectedCategory) return alert('請檢查：姓名、分類、金額皆需填寫！');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "資料傳送中...";

        if ((selectedType === "支出" || selectedType === "信用卡") && !amount.startsWith("-")) {
            amount = "-" + amount;
        }

        const params = new URLSearchParams();
        params.append('entry.760255955', selectedType); 
        params.append('entry.1900830363', selectedPayer);
        params.append('entry.883377183', amount);
        params.append('entry.1671228725', selectedCategory);
        params.append('entry.429727703', note);

        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeZincp4x3IA2v3ykuSmBhdFu_QeYL_iHbwreguQeINtw8HeA/formResponse";
        
        fetch(`${formURL}?${params.toString()}`, { mode: 'no-cors' })
            .then(() => {
                alert('已成功紀錄！');
                location.reload();
            });
    }

    window.onload = function() {
        renderCategories();
        loadDashboard();
    };
</script>
</body>
</html>
